name: chikabooks_app
description: A new Flutter project.
publish_to: 'none'
# 버전 변경 후 Xcode/Archive 전에 반드시: flutter build ios --config-only (로컬 Generated.xcconfig 갱신)
version: 1.1.5+8

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ▼▼▼ Firebase 패키지 (4.x 라인 - firebase_core_platform_interface 6.x 채널명 일치) ▼▼▼
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0
  firebase_auth: ^6.0.0
  firebase_storage: ^13.0.0
  cloud_functions: ^6.0.0
  firebase_messaging: ^16.0.0
  # ▲▲▲ Firebase 패키지 ▲▲▲

  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.2
  crypto: ^3.0.6
  kakao_flutter_sdk_user: ^1.10.0
  flutter_naver_login: ^2.0.1
  shimmer: ^3.0.0
  badges: ^3.1.2    
  geolocator: ^10.1.0    

  epubx: ^4.0.0
  archive: ^3.4.9
  image: ^3.3.0

  epub_view: ^3.2.0
  path_provider: ^2.1.2
  http: ^1.2.1
  pdfx: ^2.6.0
  file_selector: ^1.0.3

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ^0.18.1
  google_maps_flutter: ^2.5.0
  rive: ^0.14.0
  url_launcher: ^6.2.0
  webview_flutter: ^4.0.0
  package_info_plus: ^8.0.0
  go_router: ^14.0.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  dotted_border: ^2.1.0
  google_fonts: ^7.0.0
  shared_preferences: ^2.3.0
  fl_chart: ^0.69.0
  file_picker: ^10.3.10
  share_plus: ^10.1.4
  image_cropper: ^12.1.1
  flutter_svg: ^2.2.4
  desktop_drop: ^0.7.0
  animated_emoji: ^3.1.0
  # 웹 전용 Toss 결제(toss_payment_service_web) — 조건부 import로 모바일 빌드에 포함되지 않음
  web: ^1.1.1
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

