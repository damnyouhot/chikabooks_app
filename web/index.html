<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="하이진랩 (HygieneLab) - 치과 커뮤니티 & 구인구직 플랫폼">
  <meta name="google-signin-client_id" content="215876124758-12ug5ea0en6vmhn987af94k7gj6fbo0b.apps.googleusercontent.com">

  <!--
    Google Maps JavaScript API — google_maps_flutter 웹 렌더링에 필요합니다.
    YOUR_MAPS_API_KEY 를 실제 키로 교체하세요 (Google Cloud Console → Maps JavaScript API 활성화).
  -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_MAPS_API_KEY"></script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="chikabooks_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>chikabooks_app</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Kakao JS SDK (웹 로그인용) -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
    integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
    crossorigin="anonymous"></script>
  <script>
    Kakao.init('440fdf09100d899d4f274b5287d3c4c6');
  </script>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.js" type="text/javascript"></script>
  <script type="text/javascript">
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/build/pdf.worker.min.js";
    pdfRenderOptions = {
      cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.12.313/cmaps/',
      cMapPacked: true,
    }
  </script>
  <script>
    // 이전 Service Worker 캐시 강제 갱신
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var reg of registrations) {
          reg.update();
        }
      });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
    }
  </script>
  <!--
    파일 드롭 시 브라우저 기본 동작(이미지/파일을 새 탭에서 열기)을 막습니다.
    Flutter Web 로딩 후 엔진이 window.ondrop 을 교체하면 desktop_drop 의
    preventDefault 가 사라질 수 있어, document 캡처 단계에서 Files 드래그만 차단합니다.
    stopPropagation 은 쓰지 않아 desktop_drop 의 드롭 처리는 그대로 전달됩니다.
  -->
  <script>
    (function () {
      function isFileDrag(e) {
        var dt = e.dataTransfer;
        if (!dt || !dt.types) return false;
        var types = dt.types;
        for (var i = 0; i < types.length; i++) {
          if (types[i] === 'Files') return true;
        }
        return false;
      }
      function preventFileDropDefault(e) {
        if (isFileDrag(e)) e.preventDefault();
      }
      document.addEventListener('dragenter', preventFileDropDefault, true);
      document.addEventListener('dragover', preventFileDropDefault, true);
      document.addEventListener('drop', preventFileDropDefault, true);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
